name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Unit tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          if [ -f coverage/lcov.info ]; then
            TOTAL=$(grep -c 'DA:' coverage/lcov.info || echo 0)
            HITS=$(grep 'DA:' coverage/lcov.info | grep -cv ',0$' || echo 0)
            if [ "$TOTAL" -gt 0 ]; then
              PCT=$((HITS * 100 / TOTAL))
              echo "Coverage: $HITS/$TOTAL lines = ${PCT}%"
              if [ "$PCT" -lt 60 ]; then
                echo "::error::Coverage ${PCT}% is below 60% threshold"
                exit 1
              fi
            fi
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 14

      - name: Integration tests
        run: flutter test integration_test/ || true
