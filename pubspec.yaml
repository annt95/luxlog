name: luxlog
description: "Luxlog — Photography platform: Gallery, Social Feed, Portfolio, Discover"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.8.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Network
  dio: ^5.8.0
  supabase_flutter: ^2.8.4

  # UI & Animations
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0  # Masonry grid
  shimmer: ^3.0.0                       # Skeleton loading

  # Image
  image_picker: ^1.1.2
  photo_view: ^0.15.0                   # Full-screen zoom
  image: ^4.5.4                         # Image processing

  # EXIF
  exif: ^3.3.0

  # Utils
  intl: ^0.20.2
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2782.1

  # Google Fonts (Manrope + Inter + Space Grotesk từ Stitch design)
  google_fonts: ^6.2.1

  # Glassmorphism / blur
  glass_kit: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.3
  mocktail: ^1.0.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
