<!DOCTYPE html>
<html lang="vi">

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Nơi kể lại câu chuyện của ánh sáng. Share and discover analog photography.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0E0E0E">

  <link rel="canonical" href="https://luxlog.vercel.app" id="luxlog-canonical" />

  <!-- Open Graph (fallback, route-level values will be updated in runtime on web) -->
  <meta property="og:site_name" content="Luxlog">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Luxlog - Film Photography Community">
  <meta property="og:description" content="Nơi kể lại câu chuyện của ánh sáng. Share and discover analog photography.">
  <meta property="og:url" content="https://luxlog.vercel.app">
  <meta property="og:image" content="https://luxlog.vercel.app/icons/Icon-512.png">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Luxlog - Film Photography Community">
  <meta name="twitter:description" content="Nơi kể lại câu chuyện của ánh sáng. Share and discover analog photography.">
  <meta name="twitter:image" content="https://luxlog.vercel.app/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Luxlog">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Luxlog - Film Photography Community</title>
  <link rel="manifest" href="manifest.json">

  <!-- Structured Data (fallback) -->
  <script id="luxlog-jsonld" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Luxlog",
      "url": "https://luxlog.vercel.app",
      "applicationCategory": "Photography",
      "description": "Film photography community - share, discover, and curate analog photos"
    }
  </script>

  <!-- Vercel Speed Insights -->
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body>
  <!-- Vercel Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
