<!DOCTYPE html>
<html lang="vi">

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Nơi kể lại câu chuyện của ánh sáng. Share and discover analog photography.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0E0E0E">

  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preload critical fonts to avoid FOIT during Flutter init -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&family=Inter:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&family=Inter:wght@400;500&display=swap"></noscript>

  <link rel="canonical" href="https://luxlog.vercel.app" id="luxlog-canonical" />

  <!-- Open Graph (fallback, route-level values will be updated in runtime on web) -->
  <meta property="og:site_name" content="Luxlog">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Luxlog - Film Photography Community">
  <meta property="og:description" content="Nơi kể lại câu chuyện của ánh sáng. Share and discover analog photography.">
  <meta property="og:url" content="https://luxlog.vercel.app">
  <meta property="og:image" content="https://luxlog.vercel.app/images/og-default.svg">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Luxlog - Film Photography Community">
  <meta name="twitter:description" content="Nơi kể lại câu chuyện của ánh sáng. Share and discover analog photography.">
  <meta name="twitter:image" content="https://luxlog.vercel.app/images/og-default.svg">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Luxlog">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Luxlog - Film Photography Community</title>
  <link rel="manifest" href="manifest.json">

  <!-- Structured Data (fallback) -->
  <script id="luxlog-jsonld" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Luxlog",
      "url": "https://luxlog.vercel.app",
      "applicationCategory": "Photography",
      "description": "Film photography community - share, discover, and curate analog photos"
    }
  </script>

  <!-- Vercel Speed Insights -->
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body>
  <button id="install-app-btn" type="button" hidden style="
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      background: #c5a572;
      color: #111;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      cursor: pointer;
    ">Cài đặt Luxlog</button>

  <div id="offline-indicator" hidden style="
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 72px;
      z-index: 9999;
      border: 1px solid rgba(197, 165, 114, 0.35);
      border-radius: 10px;
      padding: 8px 12px;
      background: rgba(18, 18, 18, 0.92);
      color: #f5e8d0;
      font: 500 13px/1.2 -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    ">Bạn đang offline - một số dữ liệu có thể không khả dụng.</div>

  <!-- Loading splash (visible while Flutter initializes) -->
  <div id="loading-splash" style="
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0E0E0E;
      transition: opacity 0.4s ease;
    ">
    <style>
      @keyframes luxlog-pulse {
        0%, 100% { opacity: 0.4; transform: scale(0.96); }
        50% { opacity: 1; transform: scale(1); }
      }
      @keyframes luxlog-progress {
        0% { width: 0%; }
        20% { width: 20%; }
        50% { width: 45%; }
        80% { width: 70%; }
        95% { width: 85%; }
        100% { width: 100%; }
      }
      #loading-splash .logo-text {
        font: 700 28px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        letter-spacing: 4px;
        color: #c5a572;
        text-transform: uppercase;
        animation: luxlog-pulse 2s ease-in-out infinite;
      }
      #loading-splash .tagline {
        margin-top: 12px;
        font: 400 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: rgba(245, 232, 208, 0.6);
        letter-spacing: 0.5px;
      }
      #loading-splash .progress-track {
        margin-top: 32px;
        width: 140px;
        height: 2px;
        background: rgba(197, 165, 114, 0.15);
        border-radius: 2px;
        overflow: hidden;
      }
      #loading-splash .progress-bar {
        height: 100%;
        background: #c5a572;
        border-radius: 2px;
        animation: luxlog-progress 4s ease-out forwards;
      }
    </style>
    <div class="logo-text">Luxlog</div>
    <div class="tagline">Nơi kể lại câu chuyện của ánh sáng</div>
    <div class="progress-track">
      <div class="progress-bar" id="splash-progress"></div>
    </div>
  </div>

  <!-- Vercel Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>
  <script>
    (function () {
      var deferredPrompt = null;
      var installBtn = document.getElementById('install-app-btn');
      var offlineIndicator = document.getElementById('offline-indicator');

      function updateOfflineIndicator() {
        if (!offlineIndicator) return;
        offlineIndicator.hidden = navigator.onLine;
      }

      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        if (installBtn) {
          installBtn.hidden = false;
        }
      });

      if (installBtn) {
        installBtn.addEventListener('click', async function () {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
          installBtn.hidden = true;
        });
      }

      window.addEventListener('appinstalled', function () {
        if (installBtn) {
          installBtn.hidden = true;
        }
      });

      window.addEventListener('online', updateOfflineIndicator);
      window.addEventListener('offline', updateOfflineIndicator);
      updateOfflineIndicator();

      // Flutter web registers flutter_service_worker.js in release builds.
      // Keep a lightweight check to support troubleshooting if SW is disabled.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().catch(function () {
          // no-op
        });
      }
    })();
  </script>
  <script>
    // Custom Flutter bootstrap with loading progress
    {{flutter_js}}
    {{flutter_build_config}}

    // Safety timeout: if Flutter fails to load in 15s, show retry hint
    var _splashTimeout = setTimeout(function() {
      var splash = document.getElementById('loading-splash');
      if (splash) {
        var hint = document.createElement('div');
        hint.style.cssText = 'margin-top:24px;font:400 12px/1.4 -apple-system,sans-serif;color:rgba(245,232,208,0.5);cursor:pointer;';
        hint.textContent = 'Tải lâu quá? Nhấn để thử lại.';
        hint.onclick = function() { location.reload(); };
        splash.appendChild(hint);
      }
    }, 15000);

    _flutter.loader.load({
      onEntrypointLoaded: async function(engineInitializer) {
        clearTimeout(_splashTimeout);
        // Engine downloading complete → update progress
        var bar = document.getElementById('splash-progress');
        if (bar) bar.style.animation = 'none';
        if (bar) bar.style.width = '70%';

        var appRunner = await engineInitializer.initializeEngine();

        // Engine initialized → almost done
        if (bar) bar.style.width = '90%';

        await appRunner.runApp();

        // App running → remove splash
        if (bar) bar.style.width = '100%';
        var splash = document.getElementById('loading-splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function() { splash.remove(); }, 400);
        }
      }
    });
  </script>
</body>

</html>
