<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luxlog - Offline</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 10%, #1b1b1b 0%, #0e0e0e 55%, #090909 100%);
        color: #f5e8d0;
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .card {
        width: min(560px, 90vw);
        border: 1px solid rgba(197, 165, 114, 0.3);
        border-radius: 14px;
        padding: 24px;
        background: rgba(20, 20, 20, 0.75);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 18px;
        color: #cab894;
        line-height: 1.5;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: #c5a572;
        color: #111;
        font-weight: 700;
        padding: 10px 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Bạn đang offline</h1>
      <p>Không thể tải dữ liệu mới. Hãy kiểm tra kết nối và thử lại.</p>
      <button type="button" onclick="location.reload()">Thử lại</button>
    </main>
  </body>
</html>
